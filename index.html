<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0c0c0f" id="themeColorMeta">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HabitX">
<meta name="description" content="HabitX – Track habits, build streaks.">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>HabitX</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">Habit<span>X</span></div>
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">☀️</button>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" id="nav-today" onclick="showPage('today')">
        <span class="nav-icon">🏠</span> Today
      </button>
      <button class="nav-item" id="nav-stats" onclick="showPage('stats')">
        <span class="nav-icon">📊</span> Stats
      </button>
      <button class="nav-item" id="nav-science" onclick="showPage('science')">
        <span class="nav-icon">🧬</span> Habit Science
      </button>
      <button class="nav-item" id="nav-manage" onclick="showPage('manage')">
        <span class="nav-icon">⚙️</span> Manage
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="streak-mini">
        <div style="font-size:20px">🔥</div>
        <div>
          <div class="streak-mini-num" id="sidebarStreak">0</div>
          <div class="streak-mini-info">day streak</div>
        </div>
        <div style="margin-left:auto;text-align:right">
          <div style="font-size:11px;color:var(--text3)" id="sidebarDate"></div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <!-- Topbar -->
    <div class="topbar">
      <button class="hamburger" id="hamburgerBtn" onclick="toggleSidebar()">
        <span></span><span></span><span></span>
      </button>
      <div class="topbar-title" id="topbarTitle">Today</div>
      <div class="topbar-date" id="topbarDate"></div>
    </div>

    <!-- Content -->
    <div class="content">

      <!-- TODAY PAGE -->
      <div class="page active" id="page-today">
        <div class="streak-banner">
          <div class="streak-fire">🔥</div>
          <div class="streak-info">
            <div class="streak-num" id="streakNum">0</div>
            <div class="streak-lbl">day streak</div>
            <div class="streak-best" id="streakBest">Best: 0 days</div>
          </div>
          <div class="ring-wrap">
            <svg viewBox="0 0 68 68" width="68" height="68">
              <circle class="ring-bg" cx="34" cy="34" r="29"/>
              <circle class="ring-fg" id="ringFg" cx="34" cy="34" r="29"
                stroke-dasharray="182.2" stroke-dashoffset="182.2"/>
            </svg>
            <div class="ring-pct" id="ringPct">0%</div>
          </div>
        </div>

        <div class="section-label">Days</div>
        <div class="day-strip" id="dayStrip"></div>

        <div class="chips-row" id="chipsRow"></div>

        <div class="section-label" style="margin-top:0">Habits</div>
        <div id="habitList"></div>
      </div>

      <!-- STATS PAGE -->
      <div class="page" id="page-stats">

        <!-- Overview tiles: horizontal progress style -->
        <div class="section-label">Overview</div>
        <div class="overview-tiles" id="overviewTiles"></div>

        <!-- Stock-style candlestick chart -->
        <div class="section-label">14-Day Completion</div>
        <div class="chart-wrap">
          <div class="chart-y-labels" id="chartYLabels"></div>
          <div class="candle-area" id="candleArea"></div>
          <div class="chart-labels" id="chartLabels"></div>
        </div>

        <!-- Calendar heatmap -->
        <div class="section-label">Last 4 Weeks</div>
        <div class="cal-heatmap" id="calHeatmap"></div>

        <!-- Habit Performance -->
        <div class="section-label">Habit Performance</div>
        <div class="bar-chart" id="barChart"></div>
      </div>

      <!-- MANAGE PAGE -->
      <div class="page" id="page-manage">
        <div class="section-label">Habits</div>
        <div class="manage-section">
          <div class="manage-section-title">All Habits</div>
          <div id="manageHabitList"></div>
        </div>

        <div class="section-label">Days</div>
        <div class="manage-section">
          <div class="manage-section-title">Tracked Days</div>
          <div id="manageDayList"></div>
        </div>

        <div class="section-label">Categories</div>
        <div class="manage-section">
          <div class="manage-section-title">Categories</div>
          <div id="manageCatList"></div>
        </div>
        <div style="height:16px"></div>
      </div>

      <!-- HABIT SCIENCE PAGE -->
      <div class="page" id="page-science">
        <div class="hs-hero">
          <div class="hs-hero-icon">⚛️</div>
          <div>
            <div class="hs-hero-title">Atomic Habits</div>
            <div class="hs-hero-sub">James Clear · 2018</div>
          </div>
        </div>
        <div class="section-label">Chapters</div>
        <div id="scienceList"></div>
        <div style="height:16px"></div>
      </div>

    </div><!-- /content -->
  </div><!-- /main -->
</div><!-- /app -->

<!-- FAB -->
<button class="fab" id="fab" onclick="openAddHabit()">＋</button>

<!-- Habit Detail / Tracker Modal -->
<div class="modal-overlay" id="habitDetailModal">
  <div class="modal" style="max-height:92vh">
    <div class="modal-handle"></div>
    <div class="hd-header">
      <div class="hd-emoji" id="hdEmoji">💧</div>
      <div class="hd-info">
        <div class="hd-name" id="hdName">Habit</div>
        <div class="hd-meta" id="hdMeta"></div>
      </div>
      <button class="hd-close" onclick="closeModal('habitDetailModal')">✕</button>
    </div>

    <!-- Stats row -->
    <div class="hd-stats" id="hdStats"></div>

    <!-- Mini bar chart: last 7 days -->
    <div class="hd-section-lbl">Last 7 Days</div>
    <div class="hd-week" id="hdWeek"></div>

    <!-- All tracked days calendar -->
    <div class="hd-section-lbl">All Tracked Days</div>
    <div class="hd-calendar" id="hdCalendar"></div>

    <button class="btn btn-ghost" style="margin-top:14px" onclick="closeModal('habitDetailModal')">Close</button>
  </div>
</div>


<!-- Chapter Detail Modal -->
<div class="modal-overlay" id="chapterModal">
  <div class="modal" style="max-height:92vh">
    <div class="modal-handle"></div>
    <div id="chapterModalContent"></div>
    <button class="btn btn-ghost" style="margin-top:12px" onclick="closeModal('chapterModal')">Close</button>
  </div>
</div>

<div class="modal-overlay" id="habitModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="habitModalTitle">New Habit</div>
    <div class="form-group">
      <label class="form-label">Habit name</label>
      <input class="form-input" id="hName" placeholder="e.g. Drink 8 glasses of water" maxlength="60">
    </div>
    <div class="form-group">
      <label class="form-label">Emoji</label>
      <div class="emoji-grid" id="emojiGrid"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Category</label>
      <select class="form-select" id="hCat"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Goal (days/week)</label>
      <select class="form-select" id="hGoal">
        <option value="7">Every day (7)</option>
        <option value="6">6 days/week</option>
        <option value="5">5 days/week</option>
        <option value="4">4 days/week</option>
        <option value="3">3 days/week</option>
        <option value="2">2 days/week</option>
        <option value="1">Once a week</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="saveHabit()">Save Habit</button>
    <button class="btn btn-ghost" onclick="closeModal('habitModal')">Cancel</button>
  </div>
</div>



<div class="modal-overlay" id="catModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="catModalTitle">New Category</div>
    <div class="form-group">
      <label class="form-label">Name</label>
      <input class="form-input" id="catName" placeholder="e.g. Mindfulness" maxlength="30">
    </div>
    <div class="form-group">
      <label class="form-label">Icon</label>
      <div class="emoji-grid" id="catEmojiGrid"></div>
    </div>
    <button class="btn btn-primary" onclick="saveCat()">Save Category</button>
    <button class="btn btn-ghost" onclick="closeModal('catModal')">Cancel</button>
  </div>
</div>

<div class="modal-overlay" id="confirmModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="confirmTitle">Delete?</div>
    <p style="color:var(--text2);font-size:14px;margin-bottom:20px;line-height:1.6" id="confirmMsg"></p>
    <div class="confirm-row">
      <button class="btn btn-ghost" style="margin:0" onclick="closeModal('confirmModal')">Cancel</button>
      <button class="btn btn-danger" style="margin:0" id="confirmOk">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>


<script src="app.js"></script>
</body>
</html>
